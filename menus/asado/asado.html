<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>asado
    </title>
</head>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
        background: linear-gradient(to left, #51d4e6, rgb(253, 255, 136), #51d4e6);
        min-height: 100vh;
    }


    .regresar a {
        position: absolute;

        left: -45px;
        top: 60px;

        text-decoration: none;

        padding: px;

        background-color: rgb(0, 0, 0);

        border-radius: 5px;

        padding: 10px;

        color: rgb(8, 8, 8);

        transition: 1s;
    }

    .regresar a:hover {
        background-color: rgb(230, 105, 105);

        color: black;

        transform: translateX(45px);
    }


    /* HEADER */
    .container-banner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background-color: rgb(107, 177, 66);
        height: 60px;
        padding: 0 15px;
    }

    .Logo img {
        width: 55px;
    }

    .Logo {
        display: flex;
        align-items: center;


    }

    .Logo h1 {
        font-size: 30px;
    }


    .busqueda input {
        border-radius: 5px;
        border: none;
        padding: 5px;
        width: 350px;
    }

    .btn-menu label {
        font-size: 25px;
        cursor: pointer;
    }

    /* MENU LATERAL */
    #btn-menu {
        display: none;

    }

    .container-menu label {
        cursor: pointer;
        margin-left: 280px;
        font-size: 20px;

    }


    .container-menu {
        padding: 1px;
        position: fixed;
        left: 100%;
        top: 0;
        width: 350px;
        height: 100vh;
        background: rgb(134, 134, 134);
        transition: 0.7s;
    }

    .container-menu .cont-menu {
        margin-top: 50px;
    }

    .container-menu a {
        color: aliceblue;
        background-color: rgba(68, 68, 68, 0.438);
        height: 60px;
        border-radius: 4px;
        margin-bottom: 40px;
        box-shadow: 10px 10px 20px rgba(0, 0, 0, 0.815);
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.3s;

    }

    .container-menu a:hover {
        transform: translateY(-20%);
    }

    #btn-menu:checked~.container-menu {
        left: 1050px;
    }

    .capa {
        display: none;
    }

    #btn-menu:checked~.capa {
        display: block;
        position: fixed;
        width: 5000px;
        height: 1500px;
        background: rgba(0, 0, 0, 0.5);
    }

    /* GRID MENUS */
    .container-menus {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
        padding: 20px;
        align-items: flex-start;
        justify-items: center;
        max-width: 1000px;
        margin: 40px auto;

    }

    /* CARDS */
    .menu {
        background: rgb(189, 90, 90);
        border-radius: 10px;
        overflow: hidden;
        cursor: pointer;
        transition: 0.3s;
        display: block;
        max-width: 350px;



    }

    /* IMAGEN */
    .menu img {
        width: 100%;
        height: 180px;
        object-fit: cover;
    }

    /* TITULO */
    .menu p {
        text-align: center;
        font-size: 20px;
        padding: 5px;
        color: rgb(0, 0, 0);
    }

    /* INFO OCULTA */
    .menu .info {
        opacity: 0;
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        max-height: 0;
        overflow: hidden;
        transition: 0.3s;
        text-align: center;
        padding: 0 10px;
        color: rgb(0, 0, 0);
    }

    /* CUANDO HACEN CLICK */
    .menu.active .info {
        opacity: 1;
        max-height: 100px;
        padding: 10px;
    }

    /* EFECTO */
    .menu:hover {
        transform: scale(1.03);
    }

    /* RESPONSIVE */
    @media (max-width: 1357px) {
        .container-menu {
            position: fixed;
            left: 100%;
            top: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.945);
            transition: 0.7s;
        }

        #btn-menu:checked~.container-menu {
            left: 0px;

        }

        .container-menu label {
            cursor: pointer;
            margin-left: 1000px;
            font-size: 20px;

        }

        #btn-menu:checked~.capa {
            display: none;
        }

        .Logo h1 {
            font-size: 30px;
        }
    }






    @media (max-width: 1000px) {
        .container-menu {
            position: fixed;
            left: 100%;
            top: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.945);
            transition: 0.7s;
        }

        #btn-menu:checked~.container-menu {
            left: 0px;

        }

        .container-menu label {
            cursor: pointer;
            margin-left: 450px;
            font-size: 20px;

        }

        #btn-menu:checked~.capa {
            display: none;
        }

        .Logo h1 {
            font-size: 25px;
        }
    }






    @media (max-width: 768px) {
        .container-menus {
            grid-template-columns: repeat(2, 1fr);
        }

        .Logo h1 {
            font-size: 15px;
        }

        .busqueda {
            margin-left: -30px;

        }

        .busqueda input {
            padding: 5px;
            width: 250px;

        }
    }

    @media (max-width: 480px) {

        .container-menu {
            position: fixed;
            left: 100%;
            top: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.945);
            transition: 0.7s;
        }

        #btn-menu:checked~.container-menu {
            left: 0px;

        }

        .container-menu label {
            cursor: pointer;
            margin-left: 360px;
            font-size: 20px;

        }

        #btn-menu:checked~.capa {
            display: none;
        }


        .container-banner img {
            width: 50px;

        }

        .Logo h1 {
            font-size: 15px;
        }

        .busqueda {
            margin-left: -20px;

        }

        .busqueda input {
            padding: 5px;
            width: 200px;

        }

        .container-menus {
            grid-template-columns: 1fr;

        }

    }


    @media (max-width: 380px) {
        .Logo h1 {
            display: none;
        }

    }
</style>

<body>


    <div class="container-banner">

        <div class="Logo">
            <img src="../../imagenes/ChefGo!! Logo Final.png">
            <h1>ChefGo</h1>
        </div>
        <div class="busqueda">
            <input type="search" placeholder="Buscar...">
        </div>

        <div class="btn-menu">
            <label for="btn-menu">☰</label>
        </div>

        <input type="checkbox" id="btn-menu">

        <div class="capa"></div>

        <div class="container-menu">
            <label for="btn-menu">✖️</label>
            <div class="cont-menu">
                <nav>
                    <a href="../../sobre nosotros/sobre-nosotros.html">Sobre Nosotros</a>
                    <a href="#">Cuenta</a>
                    <a href="#">Instagram</a>
                </nav>
            </div>
        </div>

    </div>

    <div class="regresar">
        <a href="../../pagina-principal.html">Volver</a>
    </div>


    <div class="container-menus">

        <div class="menu">
            <img src="../../imagenes/secciones/asado/tipos/cerdo.png" alt="">
            <p>Asado De Cerdo</p>
            <div class="info">prendete la parrila papá que se viene el finde!!</div>
        </div>

        <div class="menu">
            <img src="../../imagenes/secciones/asado/tipos/clasico.png">
            <p>Clasico</p>
            <div class="info">Armate ese fernesito crack que hoy juega el clasico en la parrilla!</div>
        </div>

    </div>

    <script>
        const links = [
            "empanadas.html",
            "asado.html"
        ];

        document.querySelectorAll(".menu").forEach((card, index) => {

            card.addEventListener("click", () => {

                if (card.classList.contains("active")) {
                    window.location.href = links[index];
                } else {
                    document.querySelectorAll(".menu").forEach(c => c.classList.remove("active"));
                    card.classList.add("active");
                }

            });

        });
    </script>

</body>

</html>
