<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: rgb(237, 243, 235);
        }

        .container {
            align-content: center;
            background: rgb(196, 196, 196);
            padding: 1.5rem;
            border-radius: 13px;
            box-shadow: 0 0 6px rgba(54, 54, 54, 0.1);
            width: 400px;
            height: 450px;

        }

        .container a {
            text-decoration: none;

        }

        .btn {
            display: block;
            width: 100%;
            padding: 20px;
            margin: 15px 0;
            border: none;
            border-radius: 7px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;

        }

        .btn-login {
            background-color: #808080;
            color: white;
        }

        .btn-login:hover {
            background-color: #3a8333;
        }

        .btn-signup {
            background-color: #28a745;
            color: white;
        }

        .btn-signup:hover {
            background-color: #218838;
        }

        .Logo img {
            width: 150px;
            padding-bottom: 40px;


        }

        .Logo {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #checkbox {
            cursor: pointer;
            color: black;
        }

        .container-btn {
            display: flex;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="Logo">
            <img src="ChefGo!! Logo Final.png" alt="">

        </div>

        <label class="bienvenida">
            Bienvenido a ChefGo!! conviertete en un gran chef de cocina,con tan solo ingresar
            en ChefGo!! tus comidas favoritas en un plato ya mismo!!

        </label>

        <a href="inicio-sesion.html">
            <button class="btn btn-login" onclick="location.href='#login'">
                Iniciar Sesión
            </button>
        </a>


        <form action="crea-cuenta.html">
            <a href="crea-cuenta.html"><button class="btn btn-login" onclick="location.href='#login'">
                    crear una cuenta
                </button></a>

        </form>
    </div>

</body>

</html>
