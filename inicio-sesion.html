<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #e4e4e4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            
        }

        .login-container {
            background-color: rgb(201, 198, 198);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 350px;
            text-align: center;
        }

        h2 {
            color: #333;
            font-size: 30px;
        }

        
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        input {
            width: 330px;
            padding: 10px;
            border-radius: 5px;
            outline: none;
            background: none;
            border: white;
        }

        /* 👇 texto oculto */
        .mensaje {
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 
            'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            color: #000000;
            font-size: 14px;
            display: none;
            margin: 1px;
            transition: 0.3s;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        .mensaje.activo {
            color: #1d1c1c;
            opacity: 1;
            transform: translateY(0px);
        }

        button {
            width: 100%;
            height: 50px;
            padding: 10px;
            background-color: #1cd434;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2da01e;
        }




        .user {
            display: flex;
            align-items: center;

        }


        .pass {
            display: flex;
            align-items: center;
        }

        .Logo img {
            width: 100px;
            filter: drop-shadow(0 0 10px rgba(201, 201, 201, 0.644));


        }

        .Logo {
            display: block;
            
        }

    </style>
</head>

<body>

    <div class="login-container">
        <div class="Logo">
            <img src="ChefGo!! Logo Final.png" alt="">

        </div>
        <h2>Inicio de Sesión</h2>
        

        <form action="pagina-principal.html" method="GET">

            
            
            <div class="input-group">
                <div class="user">
                    <label>Usuario:</label>
                    <p id="msgUsuario" class="mensaje">Escribe tu increible nombre de usuario 👀</p>
                </div>

                <input type="text" id="usuario" placeholder="Ingresa tu usuario" required>

            </div>

            <div class="input-group">
                <div class="pass">
                    <label>Contraseña:</label>
                    <p id="msgPass" class="mensaje">Nunca compartas tu contraseña 🔒</p>
                </div>

                <input type="password" id="password" maxlength="15px" placeholder="Ingresa tu contraseña" required>
            </div>

            <button type="submit">Inicio</button>
        </form>
    </div>

    <!-- 👇 JAVASCRIPT -->
    <script>
        const usuario = document.getElementById("usuario");
        const msgUsuario = document.getElementById("msgUsuario");

        const password = document.getElementById("password");
        const msgPass = document.getElementById("msgPass");

        // Cuando haces click
        usuario.addEventListener("focus", () => {
            msgUsuario.style.display = "block";
        });

        password.addEventListener("focus", () => {
            msgPass.style.display = "block";
        });

        //Cuando no haces click

        usuario.addEventListener("focus", () => {
            msgUsuario.classList.add("activo");
        });

        password.addEventListener("focus", () => {
            msgPass.classList.add("activo");
        });

        usuario.addEventListener("blur", () => {
            msgUsuario.classList.remove("activo");
        });

        password.addEventListener("blur", () => {
            msgPass.classList.remove("activo");
        });
    </script>

</body>

</html>
